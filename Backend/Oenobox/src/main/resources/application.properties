spring.application.name=Oenobox

# Runtime profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/oenobox}
spring.datasource.username=${DB_USERNAME:claude}
spring.datasource.password=${DB_PASSWORD:claude}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Optional: Enable logging of SQL parameters
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Disable legacy SQL init in favor of Flyway
spring.sql.init.mode=never
