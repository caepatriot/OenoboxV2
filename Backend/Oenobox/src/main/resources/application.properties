spring.application.name=Oenobox
# Runtime profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# PostgreSQL database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/oenobox}
spring.datasource.username=${DB_USERNAME:claude}
spring.datasource.password=${DB_PASSWORD:claude}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA and Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
# Optional: Enable logging of SQL parameters
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Disable legacy SQL init in favor of Flyway
spring.sql.init.mode=never
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.issuer=${JWT_ISSUER:oenobox}
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:14}
app.auth.refresh-cookie-name=${AUTH_REFRESH_COOKIE_NAME:OENO_REFRESH}
app.auth.refresh-cookie-secure=${AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie-samesite=${AUTH_REFRESH_COOKIE_SAMESITE:Lax}
app.oauth2.authorized-redirect-uris=${OAUTH2_AUTHORIZED_REDIRECT_URIS:http://localhost:5173}
app.oauth2.default-redirect-uri=${OAUTH2_DEFAULT_REDIRECT_URI:http://localhost:5173/auth/oauth2/callback}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# OCR label scanning
app.ocr.ocrspace.url=${OCRSPACE_API_URL:https://api.ocr.space/parse/image}
app.ocr.ocrspace.api-key=${OCRSPACE_API_KEY:}
# Multipart upload limits for label photos
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:8MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:8MB}
